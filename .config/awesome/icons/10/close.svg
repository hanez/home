<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF9A9A"/>
      <stop offset="100%" stop-color="#7d1f1d"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="2.5" dy="3.5" stdDeviation="3" flood-color="#1a1a2e" flood-opacity="0.45"/>
    </filter>
  </defs>
  <g filter="url(#shadow)" fill="none">
    <g stroke="#3e0f0e" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" transform="translate(2,2)">
      <line x1="12" y1="12" x2="36" y2="36"/>
    <line x1="36" y1="12" x2="12" y2="36"/>
    </g>
    <g stroke="#7d1f1d" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" transform="translate(1,1)">
      <line x1="12" y1="12" x2="36" y2="36"/>
    <line x1="36" y1="12" x2="12" y2="36"/>
    </g>
    <g stroke="url(#iconGrad)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="12" x2="36" y2="36"/>
    <line x1="36" y1="12" x2="12" y2="36"/>
    </g>
  </g>
</svg>
