      </feMerge>
    </filter>
  </defs>
  <g fill="none" stroke="url(#g)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
<ellipse cx="24" cy="30" rx="16" ry="12"/>
    <rect x="8" y="14" width="10" height="6" rx="3"/>
    <rect x="30" y="14" width="10" height="6" rx="3"/>
