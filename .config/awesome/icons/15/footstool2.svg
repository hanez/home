      </feMerge>
    </filter>
  </defs>
  <g fill="none" stroke="url(#g)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
<rect x="10" y="20" width="28" height="12" rx="4"/><rect x="8" y="28" width="32" height="8" rx="3"/><line x1="14" y1="20" x2="12" y2="12"/><line x1="34" y1="20" x2="36" y2="12"/>
