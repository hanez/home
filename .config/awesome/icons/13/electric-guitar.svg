    </filter>
  </defs>
  <g fill="none" stroke="url(#g)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <rect x="6" y="20" width="28" height="18" rx="8"/>
    <line x1="34" y1="24" x2="42" y2="10"/>
    <line x1="34" y1="28" x2="42" y2="14"/>
