    </filter>
  </defs>
  <g fill="none" stroke="url(#g)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <rect x="8" y="16" width="14" height="6" rx="2"/>
    <line x1="22" y1="18" x2="38" y2="8"/>
    <line x1="22" y1="20" x2="36" y2="12"/>
