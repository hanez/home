<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <pattern id="grid" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M 8 0 L 0 0 0 8" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e59e9e"/>
      <stop offset="100%" stop-color="#C62828"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="2" y="2" width="44" height="44" rx="10" fill="#0d0d1a" opacity="0.92"/>
  <rect x="2" y="2" width="44" height="44" rx="10" fill="url(#grid)"/>
  <g fill="none" stroke="url(#g)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <path d="M12 20 C12 6 36 6 36 20 L36 24 L12 24 Z"/>
    <line x1="8" y1="24" x2="40" y2="24"/>
    <path d="M18 12 L18 18 L24 12 L24 18 L30 12 L30 18"/>
    <path d="M12 24 C12 38 36 38 36 24"/>
    <path d="M14 30 Q20 38 24 30 Q28 38 34 30"/>
    <circle cx="18" cy="27" r="2" fill="#C62828"/>
    <circle cx="30" cy="27" r="2" fill="#C62828"/>
  </g>
</svg>