<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="17%" stop-color="#FFA94D"/>
      <stop offset="33%" stop-color="#FFD43B"/>
      <stop offset="50%" stop-color="#69DB7C"/>
      <stop offset="67%" stop-color="#4DABF7"/>
      <stop offset="83%" stop-color="#DA77F2"/>
      <stop offset="100%" stop-color="#E599F7"/>
    </linearGradient>
    <filter id="g3d" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur2"/>
      <feOffset dx="1.5" dy="2.5" in="SourceAlpha" result="offsetAlpha"/>
      <feGaussianBlur stdDeviation="2" in="offsetAlpha" result="shadowBlur"/>
      <feFlood flood-color="#1a1a2e" flood-opacity="0.3" result="shadowColor"/>
      <feComposite in="shadowColor" in2="shadowBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g fill="none" stroke="url(#rg)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" filter="url(#g3d)">
    <line x1="10" y1="34" x2="40" y2="6"/>
    <rect x="6" y="30" width="10" height="10" rx="3" transform="rotate(-45 11 35)"/>
    <rect x="13" y="22" width="8" height="8" rx="2" transform="rotate(-45 17 26)"/>
    <rect x="22" y="12" width="6" height="6" rx="1" transform="rotate(-45 25 15)"/>
  </g>
</svg>