        <feMergeNode in="blur2"/>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g fill="none" stroke="url(#rg)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" filter="url(#g3d)">
    <ellipse cx="24" cy="24" rx="9" ry="7"/>
