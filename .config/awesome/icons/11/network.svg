<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <pattern id="px" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="none"/>
      <rect width="2" height="2" fill="rgba(0,0,0,0.2)"/>
    </pattern>
    <mask id="m">
      <rect x="0" y="0" width="48" height="48" fill="black"/>
      <g fill="none" stroke="white" stroke-width="6" stroke-linecap="square" stroke-linejoin="miter" shape-rendering="crispEdges">
    <circle cx="14" cy="24" r="6"/>
    <circle cx="34" cy="24" r="6"/>
    <line x1="20" y1="24" x2="28" y2="24"/>
    <circle cx="14" cy="24" r="2.5" fill="white"/>
    <circle cx="34" cy="24" r="2.5" fill="white"/>
      </g>
    </mask>
  </defs>
  <g fill="none" stroke="#4DD0E1" stroke-width="6" stroke-linecap="square" stroke-linejoin="miter" shape-rendering="crispEdges">
    <circle cx="14" cy="24" r="6"/>
    <circle cx="34" cy="24" r="6"/>
    <line x1="20" y1="24" x2="28" y2="24"/>
    <circle cx="14" cy="24" r="2.5" fill="#4DD0E1"/>
    <circle cx="34" cy="24" r="2.5" fill="#4DD0E1"/>
  </g>
  <rect x="0" y="0" width="48" height="48" fill="url(#px)" mask="url(#m)" pointer-events="none"/>
</svg>