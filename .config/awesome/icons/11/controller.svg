    </mask>
  </defs>
  <g fill="none" stroke="#E57373" stroke-width="6" stroke-linecap="square" stroke-linejoin="miter" shape-rendering="crispEdges">
      <rect x="12" y="22" width="24" height="14" rx="4"/>
      <rect x="14" y="32" width="8" height="6" rx="3"/>
      <rect x="26" y="32" width="8" height="6" rx="3"/>
