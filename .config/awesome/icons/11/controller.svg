      <line x1="16" y1="28" x2="20" y2="28"/>
      <circle cx="30" cy="28" r="1.5" fill="#E57373"/>
      <circle cx="33" cy="31" r="1.5" fill="#E57373"/>
      <circle cx="30" cy="34" r="1.5" fill="#E57373"/>
      <circle cx="27" cy="31" r="1.5" fill="#E57373"/>
  </g>
  <rect x="0" y="0" width="48" height="48" fill="url(#px)" mask="url(#m)" pointer-events="none"/>
