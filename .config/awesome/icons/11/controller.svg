      <rect width="2" height="2" fill="rgba(0,0,0,0.2)"/>
    </pattern>
    <mask id="m">
      <rect x="0" y="0" width="48" height="48" fill="black"/>
      <g fill="none" stroke="white" stroke-width="6" stroke-linecap="square" stroke-linejoin="miter" shape-rendering="crispEdges">
      <rect x="12" y="22" width="24" height="14" rx="4"/>
      <rect x="14" y="32" width="8" height="6" rx="3"/>
      <rect x="26" y="32" width="8" height="6" rx="3"/>
      <line x1="18" y1="26" x2="18" y2="30"/>
      <line x1="16" y1="28" x2="20" y2="28"/>
      <circle cx="30" cy="28" r="1.5" fill="white"/>
      <circle cx="33" cy="31" r="1.5" fill="white"/>
      <circle cx="30" cy="34" r="1.5" fill="white"/>
      <circle cx="27" cy="31" r="1.5" fill="white"/>
