      <rect width="2" height="2" fill="rgba(0,0,0,0.2)"/>
    </pattern>
    <mask id="m">
      <rect x="0" y="0" width="48" height="48" fill="black"/>
      <g fill="none" stroke="white" stroke-width="6" stroke-linecap="square" stroke-linejoin="miter" shape-rendering="crispEdges">
<rect x="10" y="12" width="28" height="28" rx="4"/>
    <rect x="16" y="6" width="16" height="6" rx="2"/>
    <rect x="18" y="24" width="12" height="8" rx="2"/>
    <line x1="10" y1="16" x2="6" y2="16"/>
    <line x1="38" y1="16" x2="42" y2="16"/>
      </g>
    </mask>
  </defs>
  <g fill="none" stroke="#c48460" stroke-width="6" stroke-linecap="square" stroke-linejoin="miter" shape-rendering="crispEdges">
<rect x="10" y="12" width="28" height="28" rx="4"/>
    <rect x="16" y="6" width="16" height="6" rx="2"/>
    <rect x="18" y="24" width="12" height="8" rx="2"/>
    <line x1="10" y1="16" x2="6" y2="16"/>
    <line x1="38" y1="16" x2="42" y2="16"/>
  </g>
  <rect x="0" y="0" width="48" height="48" fill="url(#px)" mask="url(#m)" pointer-events="none"/>
</svg>