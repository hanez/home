    </pattern>
    <mask id="m">
      <rect x="0" y="0" width="48" height="48" fill="black"/>
      <g fill="none" stroke="white" stroke-width="6" stroke-linecap="square" stroke-linejoin="miter" shape-rendering="crispEdges">
    <line x1="24" y1="6" x2="24" y2="34"/>
    <line x1="16" y1="12" x2="16" y2="24"/>
    <line x1="24" y1="10" x2="24" y2="24"/>
    <line x1="32" y1="12" x2="32" y2="24"/>
    <rect x="14" y="34" width="20" height="8" rx="2"/>
      </g>
    </mask>
  </defs>
  <g fill="none" stroke="#01579B" stroke-width="6" stroke-linecap="square" stroke-linejoin="miter" shape-rendering="crispEdges">
    <line x1="24" y1="6" x2="24" y2="34"/>
    <line x1="16" y1="12" x2="16" y2="24"/>
    <line x1="24" y1="10" x2="24" y2="24"/>
    <line x1="32" y1="12" x2="32" y2="24"/>
