  </defs>
  <g fill="none" stroke="#42825d" stroke-width="6" stroke-linecap="square" stroke-linejoin="miter" shape-rendering="crispEdges">
<rect x="6" y="18" width="36" height="14" rx="4"/>
    <rect x="14" y="10" width="20" height="8" rx="2"/>
    <circle cx="24" cy="10" r="3"/>
