  <g fill="none" stroke="#8D6E63" stroke-width="6" stroke-linecap="square" stroke-linejoin="miter" shape-rendering="crispEdges">
    <line x1="8" y1="18" x2="16" y2="18"/>
    <line x1="24" y1="18" x2="40" y2="18"/>
