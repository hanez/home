    </pattern>
    <mask id="m">
      <rect x="0" y="0" width="48" height="48" fill="black"/>
      <g fill="none" stroke="white" stroke-width="6" stroke-linecap="square" stroke-linejoin="miter" shape-rendering="crispEdges">
    <line x1="8" y1="18" x2="16" y2="18"/>
    <line x1="24" y1="18" x2="40" y2="18"/>
    <circle cx="20" cy="18" r="3.5" fill="white"/>
    <line x1="8" y1="32" x2="26" y2="32"/>
    <line x1="34" y1="32" x2="40" y2="32"/>
    <circle cx="30" cy="32" r="3.5" fill="white"/>
