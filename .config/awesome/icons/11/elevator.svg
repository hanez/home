      <rect width="2" height="2" fill="rgba(0,0,0,0.2)"/>
    </pattern>
    <mask id="m">
      <rect x="0" y="0" width="48" height="48" fill="black"/>
      <g fill="none" stroke="white" stroke-width="6" stroke-linecap="square" stroke-linejoin="miter" shape-rendering="crispEdges">
<rect x="12" y="4" width="24" height="40" rx="3"/>
    <rect x="6" y="28" width="36" height="8" rx="2"/>
    <line x1="18" y1="12" x2="30" y2="12"/>
    <line x1="18" y1="18" x2="30" y2="18"/>
    <line x1="18" y1="24" x2="26" y2="24"/>
      </g>
    </mask>
  </defs>
  <g fill="none" stroke="#825548" stroke-width="6" stroke-linecap="square" stroke-linejoin="miter" shape-rendering="crispEdges">
<rect x="12" y="4" width="24" height="40" rx="3"/>
    <rect x="6" y="28" width="36" height="8" rx="2"/>
    <line x1="18" y1="12" x2="30" y2="12"/>
    <line x1="18" y1="18" x2="30" y2="18"/>
    <line x1="18" y1="24" x2="26" y2="24"/>
  </g>
  <rect x="0" y="0" width="48" height="48" fill="url(#px)" mask="url(#m)" pointer-events="none"/>
</svg>