    </pattern>
    <mask id="m">
      <rect x="0" y="0" width="48" height="48" fill="black"/>
      <g fill="none" stroke="white" stroke-width="6" stroke-linecap="square" stroke-linejoin="miter" shape-rendering="crispEdges">
    <line x1="22" y1="6" x2="26" y2="44"/>
    <line x1="18" y1="10" x2="30" y2="10"/>
    <line x1="20" y1="6" x2="28" y2="6"/>
    <line x1="24" y1="16" x2="20" y2="44"/>
      </g>
    </mask>
  </defs>
  <g fill="none" stroke="#bbd3cd" stroke-width="6" stroke-linecap="square" stroke-linejoin="miter" shape-rendering="crispEdges">
    <line x1="22" y1="6" x2="26" y2="44"/>
    <line x1="18" y1="10" x2="30" y2="10"/>
    <line x1="20" y1="6" x2="28" y2="6"/>
