      <rect width="2" height="2" fill="rgba(0,0,0,0.2)"/>
    </pattern>
    <mask id="m">
      <rect x="0" y="0" width="48" height="48" fill="black"/>
      <g fill="none" stroke="white" stroke-width="6" stroke-linecap="square" stroke-linejoin="miter" shape-rendering="crispEdges">
<rect x="8" y="14" width="32" height="30" rx="2"/>
    <rect x="12" y="8" width="24" height="6" rx="2"/>
    <rect x="14" y="18" width="8" height="8" rx="1"/>
    <rect x="26" y="18" width="8" height="8" rx="1"/>
    <line x1="8" y1="30" x2="40" y2="30"/>
      </g>
    </mask>
  </defs>
  <g fill="none" stroke="#66c48b" stroke-width="6" stroke-linecap="square" stroke-linejoin="miter" shape-rendering="crispEdges">
<rect x="8" y="14" width="32" height="30" rx="2"/>
    <rect x="12" y="8" width="24" height="6" rx="2"/>
    <rect x="14" y="18" width="8" height="8" rx="1"/>
    <rect x="26" y="18" width="8" height="8" rx="1"/>
    <line x1="8" y1="30" x2="40" y2="30"/>
  </g>
  <rect x="0" y="0" width="48" height="48" fill="url(#px)" mask="url(#m)" pointer-events="none"/>
</svg>