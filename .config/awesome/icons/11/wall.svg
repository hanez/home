      <g fill="none" stroke="white" stroke-width="6" stroke-linecap="square" stroke-linejoin="miter" shape-rendering="crispEdges">
    <rect x="2" y="6" width="44" height="38" rx="2"/>
    <rect x="2" y="6" width="44" height="10"/>
    <rect x="2" y="20" width="20" height="10"/>
    <rect x="26" y="20" width="20" height="10"/>
    <rect x="2" y="34" width="14" height="10"/>
    <rect x="20" y="34" width="26" height="10"/>
      </g>
