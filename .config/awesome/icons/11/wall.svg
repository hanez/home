  </defs>
  <g fill="none" stroke="#cdb7a7" stroke-width="6" stroke-linecap="square" stroke-linejoin="miter" shape-rendering="crispEdges">
    <rect x="2" y="6" width="44" height="38" rx="2"/>
    <rect x="2" y="6" width="44" height="10"/>
    <rect x="2" y="20" width="20" height="10"/>
