<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <pattern id="px" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="none"/>
      <rect width="2" height="2" fill="rgba(0,0,0,0.2)"/>
    </pattern>
    <mask id="m">
      <rect x="0" y="0" width="48" height="48" fill="black"/>
      <g fill="none" stroke="white" stroke-width="6" stroke-linecap="square" stroke-linejoin="miter" shape-rendering="crispEdges">
    <ellipse cx="20" cy="20" rx="10" ry="6" transform="rotate(30 20 20)"/>
    <ellipse cx="28" cy="26" rx="8" ry="5" transform="rotate(-20 28 26)"/>
    <ellipse cx="18" cy="30" rx="6" ry="4" transform="rotate(45 18 30)"/>
    <circle cx="14" cy="16" r="2" fill="currentColor"/>
    <circle cx="30" cy="20" r="2" fill="currentColor"/>
    <circle cx="22" cy="34" r="1.5" fill="currentColor"/>
      </g>
    </mask>
  </defs>
  <g fill="none" stroke="#b2dbc6" stroke-width="6" stroke-linecap="square" stroke-linejoin="miter" shape-rendering="crispEdges">
    <ellipse cx="20" cy="20" rx="10" ry="6" transform="rotate(30 20 20)"/>
    <ellipse cx="28" cy="26" rx="8" ry="5" transform="rotate(-20 28 26)"/>
    <ellipse cx="18" cy="30" rx="6" ry="4" transform="rotate(45 18 30)"/>
    <circle cx="14" cy="16" r="2" fill="currentColor"/>
    <circle cx="30" cy="20" r="2" fill="currentColor"/>
    <circle cx="22" cy="34" r="1.5" fill="currentColor"/>
  </g>
  <rect x="0" y="0" width="48" height="48" fill="url(#px)" mask="url(#m)" pointer-events="none"/>
</svg>